server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: pizzaria-service
              uri: lb://PIZZARIA-SERVICE
              predicates:
                - Path=/pizzaria/**
              filters:
                - RewritePath=/pizzaria/(?<segment>.*), /$\{segment}

            - id: estoque-service
              uri: lb://ESTOQUE-SERVICE
              predicates:
                - Path=/estoque/**
              filters:
                - RewritePath=/estoque/(?<segment>.*), /$\{segment}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
