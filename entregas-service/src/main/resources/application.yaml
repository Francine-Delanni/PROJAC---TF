server:
  port: 0

spring:
  application:
    name: entregas-service

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
